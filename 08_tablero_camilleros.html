<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero Camilleros — Kairos · Zenoxia</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f4f0;--bg3:#f0efea;
  --txt:#1a1a18;--txt2:#5f5e5a;--txt3:#888780;
  --brd:rgba(0,0,0,0.10);--brd2:rgba(0,0,0,0.18);
  --p:#2B57D9;--p-light:#EBF2FF;--p-mid:#A3C0F8;--p-dark:#1A3FAA;
  --s-info-l:#E6F1FB;--s-info:#0C447C;--s-info-m:#B5D4F4;
  --s-warn-l:#FAEEDA;--s-warn:#633806;--s-warn-m:#EF9F27;
  --s-err-l:#FCEBEB;--s-err:#791F1F;--s-err-m:#E24B4A;
  --r:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg3);min-height:100vh;padding:16px;display:flex;flex-direction:column;align-items:center}

.page-meta{width:100%;max-width:960px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-i{width:28px;height:28px;background:var(--p-dark);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-i svg{width:16px;height:16px;fill:#fff}
.pm-title{font-size:14px;font-weight:500;color:var(--txt)}
.pm-sub{font-size:10px;color:var(--txt3)}
.slabel{font-size:10px;background:var(--s-info-l);color:var(--s-info);padding:3px 10px;border-radius:20px;margin-left:auto;font-weight:500;border:0.5px solid var(--s-info-m)}

.shell{width:100%;max-width:960px;background:var(--bg3);border:0.5px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* TOPBAR */
.topbar{background:var(--p-dark);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center}
.tb-icon svg{width:16px;height:16px;fill:var(--p-mid)}
.tb-title{font-size:13px;font-weight:500;color:#fff}
.tb-sub{font-size:10px;color:var(--p-mid)}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-clock{font-size:13px;font-weight:500;color:#fff;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px}
.tb-live{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--p-mid)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--p-mid);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* STATS BAR */
.stats-bar{background:var(--bg);border-bottom:0.5px solid var(--brd);padding:10px 16px;display:flex;gap:20px;align-items:center}
.stat-item{display:flex;align-items:center;gap:7px}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd-disp{background:var(--p)}
.sd-tras{background:var(--s-warn-m)}
.sd-comp{background:var(--s-info)}
.stat-label{font-size:11px;color:var(--txt2)}
.stat-val{font-size:13px;font-weight:600;color:var(--txt)}
.stats-sep{width:0.5px;height:20px;background:var(--brd);margin:0 4px}

/* GRID */
.cam-grid{padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

/* CAMILLERO CARD */
.cam-card{background:var(--bg);border:0.5px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;transition:box-shadow .15s}
.cam-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.1)}
.cam-card.disponible{border-left:3px solid var(--p)}
.cam-card.en-traslado{border-left:3px solid var(--s-warn-m)}
.cam-card.completado{border-left:3px solid var(--s-info)}

/* CARD HEADER */
.cc-head{padding:11px 13px;border-bottom:0.5px solid var(--brd);display:flex;align-items:center;gap:9px}
.cc-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.av-disp{background:var(--p-light);color:var(--p-dark)}
.av-tras{background:var(--s-warn-l);color:var(--s-warn)}
.av-comp{background:var(--s-info-l);color:var(--s-info)}
.cc-name{font-size:12px;font-weight:500;color:var(--txt);flex:1}
.cc-id{font-size:9px;color:var(--txt3)}
.cc-badge{font-size:9px;padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap}
.badge-disp{background:var(--p-light);color:var(--p-dark)}
.badge-tras{background:var(--s-warn-l);color:var(--s-warn)}
.badge-comp{background:var(--s-info-l);color:var(--s-info)}

/* CARD BODY */
.cc-body{padding:11px 13px;display:flex;flex-direction:column;gap:8px}

/* DISPONIBLE STATE */
.disp-state{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px 0;color:var(--p)}
.disp-icon{font-size:20px}
.disp-txt{font-size:12px;font-weight:500}

/* PACIENTE INFO */
.pac-block{background:var(--bg2);border-radius:var(--r);padding:9px 11px}
.pb-section{font-size:9px;font-weight:500;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.pb-name{font-size:12px;font-weight:500;color:var(--txt);margin-bottom:2px}
.pb-sub{font-size:10px;color:var(--txt2)}

/* RUTA */
.ruta-block{display:flex;align-items:center;gap:6px;padding:7px 9px;background:var(--bg2);border-radius:var(--r)}
.ruta-desde{font-size:10px;color:var(--txt2);flex:1;text-align:center}
.ruta-arrow{font-size:11px;color:var(--s-warn-m);font-weight:600;flex-shrink:0}
.ruta-hacia{font-size:10px;color:var(--txt2);flex:1;text-align:center}
.ruta-lbl{font-size:8px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;text-align:center;margin-bottom:1px}
.ruta-val{font-size:11px;font-weight:500;color:var(--txt)}

/* EQUIPAMIENTO */
.equip-list{display:flex;flex-direction:column;gap:3px}
.equip-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--txt2);padding:3px 0;border-bottom:0.5px solid var(--brd)}
.equip-item:last-child{border-bottom:none}
.equip-ico{width:14px;height:14px;border-radius:50%;background:var(--p-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* TIEMPOS */
.tiempo-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:0.5px solid var(--brd)}
.tiempo-row:last-child{border-bottom:none}
.tiempo-lbl{color:var(--txt2)}
.tiempo-val{font-weight:500;color:var(--txt)}
.tiempo-val.late{color:var(--s-err)}
.tiempo-val.ok{color:var(--p)}

/* CARD FOOTER */
.cc-foot{padding:9px 13px;border-top:0.5px solid var(--brd);display:flex;gap:7px}
.btn-asignar{flex:1;padding:8px;font-size:11px;font-weight:500;border-radius:var(--r);border:none;background:var(--p);color:#fff;cursor:pointer;transition:background .15s}
.btn-asignar:hover{background:var(--p-dark)}
.btn-completar{flex:1;padding:8px;font-size:11px;font-weight:500;border-radius:var(--r);border:none;background:var(--s-info);color:#fff;cursor:pointer}
.btn-detail{padding:8px 10px;font-size:11px;border-radius:var(--r);border:0.5px solid var(--brd2);background:transparent;color:var(--txt2);cursor:pointer}

/* LAST UPDATE */
.bottom-bar{padding:9px 16px;border-top:0.5px solid var(--brd);background:var(--bg);display:flex;align-items:center;gap:6px;font-size:10px;color:var(--txt3)}
</style>
</head>
<body>

<div class="page-meta">
  <div class="logo-i"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm1 14h-2v-4H7v-2h4V6h2v4h4v2h-4v4z"/></svg></div>
  <div><div class="pm-title">Kairos · Zenoxia</div><div class="pm-sub">Trazabilidad quirúrgica</div></div>
  <div class="slabel">Pantalla 8 — Tablero camilleros</div>
</div>

<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-icon"><svg viewBox="0 0 24 24"><path d="M20 7H4c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm-9 7H9v-2H7v2H5V9h2v2h2V9h2v5zm5-1h-2v1h2v1h-3V9h3v1h-2v1h2v2zm4 1h-1V9h1v5z"/></svg></div>
      <div>
        <div class="tb-title">Tablero de camilleros</div>
        <div class="tb-sub">Estado en tiempo real · UCA + Quirófanos</div>
      </div>
    </div>
    <div class="tb-right">
      <div class="tb-live"><div class="live-dot"></div>En vivo</div>
      <div class="tb-clock" id="clock-main">10:47 hs</div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-dot sd-disp"></div>
      <div class="stat-label">Disponibles</div>
      <div class="stat-val" id="cnt-disp">2</div>
    </div>
    <div class="stats-sep"></div>
    <div class="stat-item">
      <div class="stat-dot sd-tras"></div>
      <div class="stat-label">En traslado</div>
      <div class="stat-val" id="cnt-tras">1</div>
    </div>
    <div class="stats-sep"></div>
    <div class="stat-item">
      <div class="stat-dot sd-comp"></div>
      <div class="stat-label">Completados hoy</div>
      <div class="stat-val" id="cnt-comp">7</div>
    </div>
    <div class="stats-sep"></div>
    <div class="stat-item" style="margin-left:auto">
      <div class="stat-label" style="font-size:10px">Tiempo promedio traslado</div>
      <div class="stat-val" style="margin-left:6px">14 min</div>
    </div>
  </div>

  <!-- GRID -->
  <div class="cam-grid" id="cam-grid">
    <!-- Se renderiza dinámicamente -->
  </div>

  <!-- BOTTOM -->
  <div class="bottom-bar">
    <div class="live-dot"></div>
    <span id="last-update-txt">Actualizado hace 0 s · se refresca cada 30 s</span>
  </div>

</div>

<script>
// ── DATOS ──────────────────────────────────────────────────────
const camilleros = [
  {
    id:'CAM-01', nombre:'Suárez, Pablo', iniciales:'PS', estado:'disponible',
    turno:'Turno mañana', paciente:null, equip:[], desde:null, hacia:null, retiro:null, entrega:null
  },
  {
    id:'CAM-02', nombre:'Herrera, Valeria', iniciales:'VH', estado:'en-traslado',
    turno:'Turno mañana',
    paciente:{ nombre:'Ramírez, Jorge Alberto', hc:'00031284', proc:'Colostomía · QX 1' },
    equip:['Camilla estándar','Sujeción lateral'],
    desde:'Hab. prequirúrgica 2B',
    hacia:'Quirófano 1',
    retiro:'10:41',
    entrega:null
  },
  {
    id:'CAM-03', nombre:'Olivera, Martín', iniciales:'MO', estado:'disponible',
    turno:'Turno mañana', paciente:null, equip:[], desde:null, hacia:null, retiro:null, entrega:null
  },
  {
    id:'CAM-04', nombre:'García, Rosa', iniciales:'RG', estado:'completado',
    turno:'Turno mañana',
    paciente:{ nombre:'García, Marta Luisa', hc:'00028990', proc:'MAKO rodilla · QX 3' },
    equip:['Camilla con barandas','Monitor portátil'],
    desde:'Quirófano 3',
    hacia:'Hab. 2A recuperación',
    retiro:'09:30',
    entrega:'09:47'
  }
];

// ── RENDER ──────────────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('cam-grid');
  grid.innerHTML=camilleros.map(c=>cardHTML(c)).join('');
  document.getElementById('cnt-disp').textContent=camilleros.filter(c=>c.estado==='disponible').length;
  document.getElementById('cnt-tras').textContent=camilleros.filter(c=>c.estado==='en-traslado').length;
}

function cardHTML(c){
  const avClass={disponible:'av-disp','en-traslado':'av-tras',completado:'av-comp'}[c.estado];
  const badgeClass={disponible:'badge-disp','en-traslado':'badge-tras',completado:'badge-comp'}[c.estado];
  const badgeLabel={disponible:'Disponible','en-traslado':'En traslado',completado:'Completado'}[c.estado];
  const cardClass={disponible:'disponible','en-traslado':'en-traslado',completado:'completado'}[c.estado];

  let bodyHTML='';

  if(c.estado==='disponible'){
    bodyHTML=`<div class="disp-state"><div class="disp-icon">✓</div><div class="disp-txt">Disponible para asignación</div></div>`;
  } else {
    // Paciente
    bodyHTML+=`
      <div class="pac-block">
        <div class="pb-section">Paciente</div>
        <div class="pb-name">${c.paciente.nombre}</div>
        <div class="pb-sub">HC ${c.paciente.hc} · ${c.paciente.proc}</div>
      </div>`;
    // Ruta
    bodyHTML+=`
      <div class="ruta-block">
        <div style="flex:1">
          <div class="ruta-lbl">Desde</div>
          <div class="ruta-val">${c.desde}</div>
        </div>
        <div class="ruta-arrow">→</div>
        <div style="flex:1">
          <div class="ruta-lbl">Hacia</div>
          <div class="ruta-val">${c.hacia}</div>
        </div>
      </div>`;
    // Equipamiento
    if(c.equip.length){
      bodyHTML+=`<div class="equip-list">${c.equip.map(e=>`
        <div class="equip-item">
          <div class="equip-ico"><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="var(--p)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
          ${e}
        </div>`).join('')}</div>`;
    }
    // Tiempos
    bodyHTML+=`<div>
      ${c.retiro?`<div class="tiempo-row"><span class="tiempo-lbl">Retiro</span><span class="tiempo-val ok">${c.retiro} hs</span></div>`:''}
      ${c.entrega?`<div class="tiempo-row"><span class="tiempo-lbl">Entrega</span><span class="tiempo-val ok">${c.entrega} hs</span></div>`:''}
      ${!c.entrega&&c.retiro?`<div class="tiempo-row"><span class="tiempo-lbl">En curso</span><span class="tiempo-val">—</span></div>`:''}
    </div>`;
  }

  // Footer buttons
  let footHTML='';
  if(c.estado==='disponible'){
    footHTML=`<button class="btn-asignar" onclick="asignar('${c.id}')">+ Asignar traslado</button>`;
  } else if(c.estado==='en-traslado'){
    footHTML=`<button class="btn-completar" onclick="completar('${c.id}')">✓ Marcar entregado</button><button class="btn-detail">Ver</button>`;
  } else {
    footHTML=`<button class="btn-asignar" onclick="liberar('${c.id}')">↻ Nuevo traslado</button><button class="btn-detail">Ver</button>`;
  }

  return `
    <div class="cam-card ${cardClass}" id="card-${c.id}">
      <div class="cc-head">
        <div class="cc-av ${avClass}">${c.iniciales}</div>
        <div style="flex:1">
          <div class="cc-name">${c.nombre}</div>
          <div class="cc-id">${c.id} · ${c.turno}</div>
        </div>
        <span class="cc-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="cc-body">${bodyHTML}</div>
      <div class="cc-foot">${footHTML}</div>
    </div>`;
}

function asignar(id){
  const c=camilleros.find(x=>x.id===id);
  const now=new Date();
  const hora=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  c.estado='en-traslado';
  c.paciente={nombre:'Paz, Silvana', hc:'00029102', proc:'Artroscopia rodilla · QX 2'};
  c.equip=['Camilla estándar'];
  c.desde='Hab. prequirúrgica 2C';
  c.hacia='Quirófano 2';
  c.retiro=hora;
  c.entrega=null;
  document.getElementById('cnt-disp').textContent=camilleros.filter(x=>x.estado==='disponible').length;
  document.getElementById('cnt-tras').textContent=camilleros.filter(x=>x.estado==='en-traslado').length;
  renderGrid();
}

function completar(id){
  const c=camilleros.find(x=>x.id===id);
  const now=new Date();
  c.entrega=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  c.estado='completado';
  const cnt=parseInt(document.getElementById('cnt-comp').textContent||'0');
  document.getElementById('cnt-comp').textContent=cnt+1;
  document.getElementById('cnt-tras').textContent=camilleros.filter(x=>x.estado==='en-traslado').length;
  renderGrid();
}

function liberar(id){
  const c=camilleros.find(x=>x.id===id);
  c.estado='disponible';c.paciente=null;c.equip=[];c.desde=null;c.hacia=null;c.retiro=null;c.entrega=null;
  document.getElementById('cnt-disp').textContent=camilleros.filter(x=>x.estado==='disponible').length;
  renderGrid();
}

// ── RELOJ ──────────────────────────────────────────────────────
let upd=0;
(function tick(){
  const d=new Date();
  document.getElementById('clock-main').textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+' hs';
  upd++;
  document.getElementById('last-update-txt').textContent='Actualizado hace '+upd+' s · se refresca cada 30 s';
  if(upd>=30){upd=0;renderGrid();}
  setTimeout(tick,1000);
})();

// ── INIT ──────────────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
